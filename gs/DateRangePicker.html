<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; color: #333; background: #f9f9f9; }
      h3 { margin-top: 0; color: #1a73e8; }
      label { display: block; text-align: left; margin-top: 15px; font-weight: 600; font-size: 0.9em; margin-bottom: 5px; }
      input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
      input:focus { border-color: #1a73e8; outline: none; }
      button { width: 100%; padding: 12px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; cursor: pointer; margin-top: 25px; font-weight: bold; font-size: 14px; }
      button:hover { background: #1557b0; }
      button:disabled { background: #ccc; cursor: not-allowed; }
      #loading { display: none; margin-top: 15px; color: #d93025; font-weight: 500; }
      .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(0,0,0,.1); border-left-color: #d93025; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 5px; vertical-align: middle; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <h3>📅 TÙY CHỌN BÁO CÁO</h3>
    <label>Từ ngày:</label>
    <input type="date" id="dateStart">
    <label>Đến ngày:</label>
    <input type="date" id="dateEnd">
    <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #ddd;">
      <label>So sánh với sheet (tháng trước):</label>
      <select id="compareSheet" style="width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background: #fff;">
        <option value="">— Không so sánh —</option>
      </select>
      <p style="font-size: 0.75em; color: #888; margin-top: 5px;">Chọn sheet báo cáo tháng trước (cùng cấu trúc Báo Cáo Tổng Hợp) để thêm cột Xu hướng</p>
    </div>
    <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #ddd;">
      <label>Sheet điểm danh:</label>
      <select id="attendanceSheet" style="width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background: #fff;">
        <option value="">— Không chọn —</option>
      </select>
      <p style="font-size: 0.75em; color: #888; margin-top: 5px;">Chọn sheet điểm danh (Mã, Buổi 1-10 với X/P/M) để thêm cột Số buổi đi, Số buổi nghỉ</p>
    </div>
    <div id="loading"><span class="spinner"></span>Đang xử lý dữ liệu, vui lòng đợi...</div>
    <button id="btnRun">🚀 TẠO BÁO CÁO</button>

    <script>
      var InitialPrefs = {
        start: <?!= JSON.stringify(prefStart || '') ?>,
        end: <?!= JSON.stringify(prefEnd || '') ?>,
        compare: <?!= JSON.stringify(prefCompare || '') ?>,
        attendance: <?!= JSON.stringify(prefAttendance || '') ?>
      };
      (function() {
        function selectIfMatch(selectId, value) {
          if (!value) return;
          var el = document.getElementById(selectId);
          for (var i = 0; i < el.options.length; i++) {
            if (el.options[i].value === value) {
              el.selectedIndex = i;
              return;
            }
          }
        }

        window.onload = function() {
          google.script.run.withSuccessHandler(function(names) {
            var compareSel = document.getElementById('compareSheet');
            var attSel = document.getElementById('attendanceSheet');
            if (names && names.length) {
              for (var i = 0; i < names.length; i++) {
                var opt1 = document.createElement('option');
                opt1.value = names[i];
                opt1.textContent = names[i];
                compareSel.appendChild(opt1);
                var opt2 = document.createElement('option');
                opt2.value = names[i];
                opt2.textContent = names[i];
                attSel.appendChild(opt2);
              }
            }
            var p = InitialPrefs || {};
            if (p.start && p.end) {
              document.getElementById('dateStart').value = p.start;
              document.getElementById('dateEnd').value = p.end;
            } else {
              var d = new Date();
              document.getElementById('dateEnd').valueAsDate = d;
              var d2 = new Date(d.getTime());
              d2.setDate(1);
              document.getElementById('dateStart').valueAsDate = d2;
            }
            selectIfMatch('compareSheet', p.compare);
            selectIfMatch('attendanceSheet', p.attendance);
          }).getSheetNamesForCompare();
        };

        document.getElementById('btnRun').addEventListener('click', function() {
          var s = document.getElementById('dateStart').value;
          var e = document.getElementById('dateEnd').value;
          if (!s || !e) {
            alert('Vui lòng chọn đầy đủ ngày bắt đầu và kết thúc!');
            return;
          }
          var compareSheetName = document.getElementById('compareSheet').value;
          if (compareSheetName === '') compareSheetName = null;
          var attendanceSheetName = document.getElementById('attendanceSheet').value;
          if (attendanceSheetName === '') attendanceSheetName = null;
          var btn = document.getElementById('btnRun');
          var loader = document.getElementById('loading');
          btn.disabled = true;
          btn.innerText = '⏳ Đang tạo báo cáo...';
          loader.style.display = 'block';

          var cmp = compareSheetName || '';
          var att = attendanceSheetName || '';
          google.script.run
            .withSuccessHandler(function() {
              google.script.run
                .withSuccessHandler(function() {
                  google.script.host.close();
                })
                .withFailureHandler(function() {
                  google.script.host.close();
                })
                .saveReportDialogPrefs(s, e, cmp, att);
            })
            .withFailureHandler(function(err) {
              var msg = (err && err.message) ? err.message : String(err);
              alert('Lỗi: ' + msg);
              btn.disabled = false;
              btn.innerText = '🚀 THỬ LẠI';
              loader.style.display = 'none';
            })
            .generateRangeReport(s, e, compareSheetName, attendanceSheetName);
        });
      })();
    </script>
  </body>
</html>
