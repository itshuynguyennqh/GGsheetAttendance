openapi: 3.0.3
info:
  title: Azota API (Unofficial)
  description: |
    Tài liệu API Azota thu thập từ HAR (DevTools Network).
    **Azota không công bố API công khai** - thông tin reverse-engineer từ web app.
    
    Để thử API, cần lấy Bearer token hoặc Cookie từ DevTools sau khi đăng nhập azota.vn.
  version: 1.0.0

servers:
  - url: https://azt-teacher-api.azota.vn
    description: Teacher API
  - url: https://azt-student-api.azota.vn
    description: Student API
  - url: https://azt-tracking-api.azota.vn
    description: Tracking API
  - url: https://aiapi.azota.vn
    description: AI API
  - url: https://azt-adsword-api.azota.vn
    description: Adsword API

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    classroomId:
      name: classroomId
      in: query
      schema: { type: integer }
    classId:
      name: classId
      in: query
      schema: { type: integer }
    id:
      name: id
      in: query
      schema: { type: integer }
    shareType:
      name: shareType
      in: query
      schema: { type: string, example: all }
    getStatistic:
      name: getStatistic
      in: query
      schema: { type: integer, enum: [0, 1] }

paths:
  # ========== TEACHER API ==========
  /api/Info/RefreshNewToken:
    get:
      tags: [Teacher API]
      summary: Làm mới token
      servers: [{ url: https://azt-teacher-api.azota.vn }]
      responses:
        '200': { description: OK }

  /api/Auth/ExchangeAccessToken:
    get:
      tags: [Teacher API, Student API]
      summary: Đổi access token
      servers:
        - { url: https://azt-teacher-api.azota.vn }
        - { url: https://azt-student-api.azota.vn }
      responses:
        '200': { description: OK }

  /api/Info/GetEnvV2:
    get:
      tags: [Teacher API, Student API]
      summary: Cấu hình môi trường
      servers:
