        - { url: https://azt-student-api.azota.vn }
      responses:
        '200': { description: OK }

  /api/Classroom/GetObj:
    get:
      tags: [Teacher API]
      summary: Chi tiết lớp
      servers: [{ url: https://azt-teacher-api.azota.vn }]
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '200': { description: OK }

  /api/ClassroomGroup/GetObjs:
    get:
      tags: [Teacher API]
      summary: Danh sách nhóm lớp
      servers: [{ url: https://azt-teacher-api.azota.vn }]
      parameters: [{ $ref: '#/components/parameters/shareType' }]
      responses:
        '200': { description: OK }

  /api/StudentProfileV2/GetObjsByClassroomId:
    get:
      tags: [Teacher API]
      summary: Học sinh theo lớp
      servers: [{ url: https://azt-teacher-api.azota.vn }]
      parameters:
        - { $ref: '#/components/parameters/classroomId' }
        - { $ref: '#/components/parameters/getStatistic' }
      responses:
        '200': { description: OK }

  /api/StudentProfileV2/ListStudentClassrooms:
    get:
      tags: [Teacher API]
      summary: Lớp của học sinh
